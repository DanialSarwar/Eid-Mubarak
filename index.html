<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Greeting</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    
    <div id="intro-screen">
        <button id="open-btn">Tap to open your gift ✨</button>
    </div>

    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="night-sky">
        
        <div class="heart heart1"></div>
        <div class="heart heart2"></div>
        <div class="heart heart3"></div>
        <div class="heart heart4"></div>
        <div class="heart heart5"></div>
        <div class="heart heart6"></div>

        <div class="shooting-star"></div>
        <div class="shooting-star star-2"></div>

        <div class="lantern-container">
            <div class="lantern-chain"></div>
            <div class="lantern">
                <div class="lantern-top"></div>
                <div class="lantern-body">
                    <div class="lantern-candle"></div>
                </div>
                <div class="lantern-base"></div>
            </div>
        </div>

        <div class="moon"></div>

        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>

        <div class="greeting-card">
            <h1 class="romantic-greeting">Eid Mubarak, <span id="recipient-name">My Love</span></h1>
            <p class="sub-greeting">May our days be filled with endless light, joy, and each other.</p>
        </div>
        
    </div>

    <script>
        // --- Feature 3: The Custom Name Trick ---
        // This looks at the web address for "?to=Name"
        const urlParams = new URLSearchParams(window.location.search);
        const customName = urlParams.get('to');
        
        if (customName) {
            // If a name is found, capitalize the first letter and update the card!
            const formattedName = customName.charAt(0).toUpperCase() + customName.slice(1);
            document.getElementById('recipient-name').innerText = formattedName;
        }

        // --- Feature 1: The Unboxing Reveal ---
        const introScreen = document.getElementById('intro-screen');
        const openBtn = document.getElementById('open-btn');
        const audio = document.getElementById('bg-music');

        openBtn.addEventListener('click', function() {
            audio.play(); // Start the music
            introScreen.style.opacity = '0'; // Fade out the intro screen
            
            // Wait 1 second for the fade, then remove it completely
            setTimeout(() => {
                introScreen.style.display = 'none';
            }, 1000);
            
            // Add a class to the body to trigger the moon and card animations!
            document.body.classList.add('unboxed');
        });

        // --- Feature 2: Magic Touch Sparkles ---
        function createSparkle(x, y) {
            const sparkle = document.createElement('div');
            sparkle.className = 'magic-sparkle';
            sparkle.style.left = x + 'px';
            sparkle.style.top = y + 'px';
            document.body.appendChild(sparkle);
            
            // Remove the sparkle after it fades out
            setTimeout(() => { sparkle.remove(); }, 800);
        }

        // Create sparkles when a mouse moves
        document.addEventListener('mousemove', function(e) {
            if(Math.random() > 0.4) createSparkle(e.clientX, e.clientY);
        });

        // Create sparkles when a finger swipes on a phone
        document.addEventListener('touchmove', function(e) {
            let touch = e.touches[0];
            if(Math.random() > 0.4) createSparkle(touch.clientX, touch.clientY);
        });
    </script>
</body>
</html>
