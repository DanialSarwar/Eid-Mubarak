<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Mubarak Greeting</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@700&display=swap" rel="stylesheet">
</head>
<body>
    
    <audio id="bg-music" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <div class="night-sky">
        
        <div class="shooting-star"></div>
        <div class="shooting-star star-2"></div>

        <div class="lantern-container">
            <div class="lantern-chain"></div>
            <div class="lantern">
                <div class="lantern-top"></div>
                <div class="lantern-body">
                    <div class="lantern-candle"></div>
                </div>
                <div class="lantern-base"></div>
            </div>
        </div>

        <div class="moon"></div>

        <div class="star star1"></div>
        <div class="star star2"></div>
        <div class="star star3"></div>
        <div class="star star4"></div>
        <div class="star star5"></div>
        <div class="star star6"></div>
        <div class="star star7"></div>

        <div class="greeting-card">
            <h1 class="calligraphy">عید مبارک</h1>
            
            <h2 class="greeting">Eid Mubarak</h2>
            <p class="sub-greeting">May your day be filled with light and joy.</p>
            <p style="font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-top: 15px;">(Tap anywhere for music)</p>
        </div>
        
    </div>

    <script>
        document.body.addEventListener("click", function () {
            var audio = document.getElementById("bg-music");
            if (audio.paused) {
                audio.play();
            }
        });
    </script>
</body>
</html>
